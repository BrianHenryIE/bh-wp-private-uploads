name: E2E Tests

# Runs Playwright end-to-end tests against wp-env.
#
# npx playwright test
#
# @author BrianHenryIE

on:
  pull_request:
    types: [opened, synchronize, closed]
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  e2e:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:

      - name: Git checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # The development plugin needs the PHP dev dependencies.
      - name: Install PHP dependencies
        run: composer install

      - name: Install JS dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start wp-env
        run: npm run wp-env

      - name: Wait for WordPress to be ready
        run: |
          echo "Waiting for WordPress to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8888 > /dev/null; then
              echo "WordPress is ready!"
              break
            fi
            echo "Attempt $i: WordPress not ready yet..."
            sleep 2
          done

      - name: Activate plugins
        run: |
          # Activate the development plugin on development environment (port 8888)
          npx wp-env run cli -- wp plugin activate development-plugin
          # List plugins to verify activation
          npx wp-env run cli -- wp plugin list
          # Set up permalinks for REST API
          npx wp-env run cli -- wp rewrite structure '/%year%/%monthnum%/%postname%/' --hard

      - name: Make the uploads directory writable by the web server
        # The CLI commands above run as root and eagerly create
        # wp-content/uploads/private-media (on `init`) owned by root, mode 0755.
        # Uploads run as the web-server user (www-data), which then cannot create
        # the dated sub-directory inside it. macOS Docker Desktop hides this
        # because it does not enforce bind-mount ownership; the Linux CI runner
        # does, so grant write access before the tests upload any files.
        run: npx wp-env run cli -- chmod -R 0777 wp-content/uploads

      - name: Run Playwright tests
        run: npm run test:e2e -- --reporter=github
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 30
