name: E2E Tests

# Runs Playwright end-to-end tests against wp-env.
#
# npx playwright test
#
# @author BrianHenryIE

on:
  pull_request:
    types: [opened, synchronize, closed]
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  e2e:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:

      - name: Git checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      # The development plugin needs the PHP dev dependencies.
      - name: Install PHP dependencies
        run: composer install

      - name: Install JS dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start wp-env
        run: npm run wp-env

      - name: Wait for WordPress to be ready
        run: |
          echo "Waiting for WordPress to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8888 > /dev/null; then
              echo "WordPress is ready!"
              break
            fi
            echo "Attempt $i: WordPress not ready yet..."
            sleep 2
          done

      - name: Activate plugins
        run: |
          # Activate the development plugin on development environment (port 8888)
          npx wp-env run cli -- wp plugin activate development-plugin
          # List plugins to verify activation
          npx wp-env run cli -- wp plugin list
          # Set up permalinks for REST API
          npx wp-env run cli -- wp rewrite structure '/%year%/%monthnum%/%postname%/' --hard

      - name: Make the private uploads directory writable by the web server
        # The activation commands above run as the (non-root) CLI-container user
        # and, via the plugin's `init` hook, create wp-content/uploads/private-media
        # owned by that user. Uploads then run as the web server (www-data), which
        # can't create the dated sub-directory inside it. The CLI user owns
        # private-media (it created it), so it can chmod *that* dir even though it
        # can't chmod the parent uploads/ it doesn't own. 0777 lets www-data write.
        # (This only bites on the Linux CI runner; macOS Docker Desktop ignores
        # bind-mount ownership.) Fall back to sudo on the whole tree just in case.
        run: |
          npx wp-env run cli -- chmod -R 0777 wp-content/uploads/private-media \
            || npx wp-env run cli -- sudo chmod -R 0777 wp-content/uploads

      - name: Run Playwright tests
        run: npm run test:e2e -- --reporter=github
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 30
