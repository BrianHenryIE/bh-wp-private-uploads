name: Integration

# Runs integration tests.
#
# vendor/bin/codecept run integration
#
# @author BrianHenryIE

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  ci:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: bh_wp_private_uploads_tests
        ports:
          - 3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    strategy:
      matrix:
        php: [ '8.1', '8.2', '8.3' ,'8.4', '8.5', '8.6' ]

    steps:

      - name: Git checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.2
        with:
          php-version: ${{ matrix.php }}
          # Codeception reads its arguments from $argv and refuses to start without this. setup-php
          # enables it by default on the older versions but not on 8.5+.
          ini-values: register_argc_argv=On

      - name: Update .env.testing config for GitHub Actions
        env:
          PLUGIN_SLUG: ${{ github.event.repository.name }}
        run: |
          find . -depth \( -name '.env.testing' \) -exec sed -i "s/_DB_PORT=\"33066\"/_DB_PORT=\"${{ job.services.mysql.ports['3306'] }}\"/g" {} +

      - name: Read .env.testing
        uses: c-py/action-dotenv-to-setenv@v5
        with:
          env-file: .env.testing

      - name: Install PHP dependencies
        run: composer install --verbose

      - name: Install JS dependencies
        run: npm install

      - name: Build JS
        run: npm run build

      - name: Setup test environment
        run: cp .env.testing .env

      - name: Run integration tests
        run: vendor/bin/codecept run integration # --report // TODO: GitHub Actions printer.
